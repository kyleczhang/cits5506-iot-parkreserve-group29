openapi: 3.0.3
info:
  title: ParkReserve Backend API
  description: |
    REST API for the ParkReserve cloud backend (CITS5506 Subsystem F).

    All `/api/v1/*` endpoints return `application/json` and use a uniform
    error envelope:

    ```json
    { "error": { "code": "string", "message": "string", "details": {} } }
    ```

    The Pi owns the per-bay state machine; the backend mirrors it and runs
    the reservation business layer (booking window, breach accounting,
    plate management, notifications). See
    [backend-implementation-plan.md](backend-implementation-plan.md) §7 for
    the authoritative interface description.
  version: "1.0.0"
  contact:
    name: ParkReserve Group 29 (CITS5506)

servers:
  - url: http://localhost:8000
    description: Local development (`make dev`)
  - url: https://{host}
    description: Production
    variables:
      host:
        default: api.parkreserve.example

tags:
  - name: health
    description: Liveness / readiness probes.
  - name: auth
    description: Registration, login, current-user profile.
  - name: bays
    description: Read-only views of the parking-bay mirror (state owned by Pi).
  - name: plates
    description: Bind / unbind LPR plates against the current user.
  - name: reservations
    description: Booking (with mock-card pre-auth deposit), cancel, fallback check-in.
  - name: payments
    description: Read-only mock-payment ledger for the current user (pre-auth, release, refund, penalty captures).
  - name: conflicts
    description: Admin view of unresolved facility conflicts and resolution.
  - name: internal
    description: Server-to-server endpoints called by the Raspberry Pi.

security:
  - BearerAuth: []

paths:
  /healthz:
    get:
      tags: [health]
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: Service is alive.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }

  /readyz:
    get:
      tags: [health]
      summary: Readiness probe (DB)
      description: |
        Returns 200 when the database is reachable. Returns 503 when the
        database check fails.

        MQTT is intentionally not part of readiness: outbound publish is
        best-effort, and inbound MQTT liveness is managed separately by
        process supervision and logs rather than this HTTP endpoint.
      security: []
      responses:
        "200":
          description: Ready.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReadinessResponse" }
        "503":
          description: Not ready.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReadinessResponse" }

  /api/v1/auth/register:
    post:
      tags: [auth]
      summary: Register a new driver account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserOut" }
        "409":
          description: Email already registered.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "422":
          description: Invalid payload (bad email, short password, etc.).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: Exchange credentials for a JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Authenticated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenResponse" }
        "401":
          description: Invalid credentials.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "422":
          description: Invalid payload.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /api/v1/auth/me:
    get:
      tags: [auth]
      summary: Current user profile
      responses:
        "200":
          description: OK.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserOut" }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/bays:
    get:
      tags: [bays]
      summary: List all bays with mirrored Pi state
      security: []
      responses:
        "200":
          description: OK.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/BayOut" }

  /api/v1/bays/{code}:
    get:
      tags: [bays]
      summary: Bay detail
      security: []
      parameters:
        - $ref: "#/components/parameters/BayCode"
      responses:
        "200":
          description: OK.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BayOut" }
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/bays/{code}/events:
    get:
      tags: [bays]
      summary: Per-bay audit log (admin)
      description: |
        Admin-only audit-log view of the `bay_events` table, newest first.
        Every state mutation produced by the Pi (state changes, sensor
        online/offline, auto check-in, conflicts, no-show) and every
        reservation-side mutation (created, cancelled, completed,
        plates updated) is recorded as a row here.

        Pagination is keyset-based: pass the previous page's last
        `created_at` value as `before` to fetch the next page. The query
        is served by the `(bay_id, created_at)` index on `bay_events`.
      parameters:
        - $ref: "#/components/parameters/BayCode"
        - in: query
          name: limit
          required: false
          description: Page size, clamped to `[1, 200]`. Default 50.
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - in: query
          name: before
          required: false
          description: |
            ISO-8601 datetime cursor — return events strictly older than
            this. Pass the previous page's last `created_at` to paginate.
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: OK (newest first).
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/BayEventOut" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Invalid query parameter (e.g. malformed `before`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /api/v1/users/me/plates:
    get:
      tags: [plates]
      summary: List the current user's bound plates
      responses:
        "200":
          description: OK.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PlateOut" }
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [plates]
      summary: Bind a plate to the current user
      description: |
        Plates are normalised (uppercase, no spaces). On success, the updated
        bound-plate list is republished over MQTT
        (`cloud/bay/<code>/reservation` with `action: "update_plates"`) for
        every active reservation belonging to this user.

        Limit: 5 plates per user.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PlateAddRequest" }
      responses:
        "201":
          description: Plate bound.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlateOut" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          description: Invalid payload, > 5 plates, or duplicate plate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /api/v1/users/me/plates/{plate}:
    delete:
      tags: [plates]
      summary: Remove a bound plate
      description: |
        Re-publishes the updated bound-plate list to the Pi for any active
        reservation belonging to this user.
      parameters:
        - in: path
          name: plate
          required: true
          schema: { type: string, example: "ABC123" }
      responses:
        "204":
          description: Removed.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/reservations:
    post:
      tags: [reservations]
      summary: Reserve a bay
      description: |
        Booking rules:

        - `0 < expected_arrival_time - now() ≤ 60 min` (else **422**).
        - User must have ≥ 1 bound plate (auto check-in needs plates).
        - Bay must be `AVAILABLE` (mirror); `OCCUPIED` / `CONFLICT` → **409**,
          `OFFLINE` → **409** (`bay_offline`). Concurrent races on `RESERVED*`
          are caught by a partial unique index and translated to **409**.
        - The body must carry `card` (mock card details). The backend looks
          up the matching row in the `mock_cards` table, debits the deposit
          (`DEPOSIT_CENTS`, default $10) as a `pre_auth` payment, and only
          then commits the reservation. Unknown card, expired card, or
          insufficient funds → **402**.

        On success, publishes `cloud/bay/<code>/reservation` with
        `action: "create"` and the user's bound-plate list so the Pi can
        match LPR results. The response includes a `payment.deposit_cents`
        field so the dashboard can show the held amount.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReservationCreateRequest" }
      responses:
        "201":
          description: Reservation created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReservationOut" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Bay not bookable, or race-condition unique violation.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "402":
          description: |
            Payment pre-authorisation failed. Common codes:
              * `card_invalid`
              * `card_expired`
              * `insufficient_funds`
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "422":
          description: |
            Booking window violation, no bound plates, malformed card
            payload, or otherwise invalid payload.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

    get:
      tags: [reservations]
      summary: List the current user's reservations
      responses:
        "200":
          description: OK.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ReservationOut" }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/reservations/{id}:
    get:
      tags: [reservations]
      summary: Reservation detail
      parameters:
        - $ref: "#/components/parameters/ReservationId"
      responses:
        "200":
          description: OK.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReservationOut" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not found, or owned by a different non-admin user.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /api/v1/reservations/{id}/cancel:
    post:
      tags: [reservations]
      summary: Cancel a reservation
      description: |
        Idempotent — repeated calls on an already-cancelled reservation
        return 200 with the existing record.

        Classified as a `late_cancel` when called less than 15 minutes
        before `expected_arrival_time` — the reservation transitions to
        `CANCELLED_LATE` and a `penalty_capture` payment row is inserted
        against the held deposit (no breach/ban accounting). A clean
        cancel releases the deposit instead. Only valid from `ACTIVE` or
        `PENDING_CHECK_IN`; other non-cancellable states (`CHECKED_IN`,
        `COMPLETED`, `EXPIRED_NO_SHOW`, `IN_CONFLICT`) return 409.
      parameters:
        - $ref: "#/components/parameters/ReservationId"
      responses:
        "200":
          description: Cancelled (or no-op on already-cancelled).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReservationOut" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Reservation is in a non-cancellable state.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /api/v1/reservations/{id}/check-in:
    post:
      tags: [reservations]
      summary: Fallback check-in (QR or manual)
      description: |
        Used **only** when LPR did not auto-resolve. Auto check-in is
        server-driven via the Pi `auto_check_in` event and never reaches
        this endpoint.

        Accepted from `PENDING_CHECK_IN`, and from `IN_CONFLICT` when the
        open `conflicts` row has `kind='weak'` (a late manual check-in
        clears the alarm and resolves the conflict with
        `user_arrived_and_checked_in`; the prior `weak_conflict` penalty
        capture is **not** refunded).

        Persists `check_in_mechanism = body.source` (`qr` or `manual`);
        `check_in_recognised_plate` stays NULL (DB invariant I14).
      parameters:
        - $ref: "#/components/parameters/ReservationId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReservationCheckInRequest" }
      responses:
        "200":
          description: Checked in (or no-op on already-checked-in).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReservationOut" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: |
            Conflict — common codes:
              * `vehicle_not_detected_yet` — reservation is still `ACTIVE`
                (vehicle sensor has not fired). Dashboard auto-retries on
                the next `reservation.pending_check_in` WS event.
              * Strong `IN_CONFLICT` (cannot be cleared by user).
              * Other non-checkable states (`COMPLETED`, `EXPIRED_NO_SHOW`,
                `CANCELLED*`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "422":
          description: |
            Invalid payload, or `bay_code` does not match the reservation's
            bay (input validation, not state conflict).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /api/v1/users/me/payments:
    get:
      tags: [payments]
      summary: List the current user's mock-payment ledger
      description: |
        Returns every `payments` row owned by the caller, newest first.
        Rows include the original `pre_auth` (deposit hold at booking),
        plus any subsequent `release` (clean cancel / completion remainder),
        `refund` (issued on strong-conflict reservations), or
        `penalty_capture` (`late_cancel`, `no_show`, `weak_conflict`).
      responses:
        "200":
          description: OK.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TransactionListResponse" }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/users/me/payments/{payment_id}:
    get:
      tags: [payments]
      summary: Mock-payment transaction detail
      parameters:
        - in: path
          name: payment_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: OK.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TransactionOut" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/conflicts:
    get:
      tags: [conflicts]
      summary: List unresolved conflicts (admin)
      description: Admin only. Returns conflicts whose `resolved_at` is NULL.
      responses:
        "200":
          description: OK.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ConflictOut" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/conflicts/{id}/evidence:
    get:
      tags: [conflicts]
      summary: Stream the captured evidence image (admin)
      description: |
        Returns the JPEG body. **404** once the image has been purged
        (`image_purge_at < now()`, default 30 days).
      parameters:
        - $ref: "#/components/parameters/ConflictId"
      responses:
        "200":
          description: JPEG image.
          content:
            image/jpeg:
              schema: { type: string, format: binary }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Conflict not found, or evidence already purged.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /api/v1/conflicts/{id}/resolve:
    post:
      tags: [conflicts]
      summary: Mark a conflict resolved (admin)
      parameters:
        - $ref: "#/components/parameters/ConflictId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ConflictResolveRequest" }
      responses:
        "200":
          description: Resolved.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConflictOut" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Invalid resolution value.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /api/v1/internal/conflicts/evidence:
    post:
      tags: [internal]
      summary: Pi → backend evidence-image upload (shared-token auth)
      description: |
        Multipart upload of the JPEG captured by the Pi when raising a
        `conflict_strong`. Authenticated by a shared bearer token
        (`Authorization: Bearer <evidence_upload_token>`), **not** a user
        JWT — the Pi has no user account. Idempotent on `source_event_id`.
      security:
        - EvidenceUploadToken: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [bay_code, source_event_id, image]
              properties:
                bay_code:
                  type: string
                  example: "B01"
                source_event_id:
                  type: string
                  format: uuid
                  description: UUID of the `conflict_strong` MQTT event this image belongs to.
                recognised_plate:
                  type: string
                  nullable: true
                  example: "ABC123"
                image:
                  type: string
                  format: binary
                  description: JPEG image bytes.
      responses:
        "201":
          description: Stored.
          content:
            application/json:
              schema:
                type: object
                properties:
                  conflict_id: { type: string, format: uuid }
                  stored_at: { type: string, format: date-time }
        "401":
          description: Missing or invalid evidence-upload token.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "422":
          description: Invalid multipart payload.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT obtained from `POST /api/v1/auth/login`. Passed as
        `Authorization: Bearer <token>`.
    EvidenceUploadToken:
      type: http
      scheme: bearer
      description: |
        Shared bearer token used by the Raspberry Pi to upload conflict
        evidence images. Configured server-side via `EVIDENCE_UPLOAD_TOKEN`.

  parameters:
    BayCode:
      in: path
      name: code
      required: true
      schema: { type: string, example: "B01" }
    ReservationId:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    ConflictId:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }

  responses:
    Unauthorized:
      description: Missing or invalid JWT.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    Forbidden:
      description: Authenticated, but not authorised (e.g. non-admin on admin route).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  schemas:
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: validation_error
            message:
              type: string
              example: invalid reservation payload
            details:
              type: object
              additionalProperties: true

    ReadinessResponse:
      type: object
      required: [db]
      properties:
        db: { type: boolean }

    # ---- auth ----------------------------------------------------------------
    RegisterRequest:
      type: object
      required: [email, name, password]
      properties:
        email: { type: string, format: email }
        name: { type: string, minLength: 1, maxLength: 120 }
        password: { type: string, minLength: 8, maxLength: 128, format: password }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 1, maxLength: 128, format: password }

    UserOut:
      type: object
      required: [id, email, name, role]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        name: { type: string }
        role:
          type: string
          enum: [user, admin]

    TokenResponse:
      type: object
      required: [access_token, token_type, user]
      properties:
        access_token: { type: string }
        token_type:   { type: string, default: Bearer }
        user: { $ref: "#/components/schemas/UserOut" }

    # ---- bays ----------------------------------------------------------------
    BayState:
      type: string
      enum:
        - available
        - reserved
        - occupied
        - pending_check_in
        - reserved_checked_in
        - conflict
        - offline
      description: |
        Mirrors the Pi-owned bay state, including the explicit `offline`
        state written when the Pi reports `sensor_offline`.

    BayOut:
      type: object
      required: [code, label, state]
      properties:
        code: { type: string, example: "B01" }
        label: { type: string, example: "Bay 1" }
        state: { $ref: "#/components/schemas/BayState" }
        last_distance_cm:
          type: number
          format: double
          nullable: true
          description: Most recent ultrasonic reading from the Pi (cm).
        sensor_last_seen_at:
          type: string
          format: date-time
          nullable: true
        current_reservation_id:
          type: string
          format: uuid
          nullable: true
        current_reservation_arrival:
          type: string
          format: date-time
          nullable: true
        check_in_grace_expires_at:
          type: string
          format: date-time
          nullable: true

    BayEventKind:
      type: string
      enum:
        - state_changed
        - sensor_online
        - sensor_offline
        - pending_check_in
        - auto_check_in
        - check_in_confirmed
        - conflict_strong
        - conflict_weak
        - conflict_resolved
        - no_show
        - reservation_created
        - reservation_cancelled
        - reservation_completed
        - plates_updated

    BayEventOut:
      type: object
      required: [id, kind, payload, created_at]
      properties:
        id:
          type: integer
          format: int64
          description: Auto-incremented row ID.
        kind: { $ref: "#/components/schemas/BayEventKind" }
        from_state:
          allOf:
            - $ref: "#/components/schemas/BayState"
          nullable: true
          description: Present on `state_changed` rows; null otherwise.
        to_state:
          allOf:
            - $ref: "#/components/schemas/BayState"
          nullable: true
        reservation_id:
          type: string
          format: uuid
          nullable: true
        payload:
          type: object
          additionalProperties: true
          description: |
            Free-form per-event metadata — e.g. `{ "distance_cm": 12.5 }`
            on `state_changed`, `{ "recognised_plate": "...",
            "lpr_confidence": 0.92 }` on `auto_check_in` and
            `conflict_strong`.
        created_at:
          type: string
          format: date-time

    # ---- plates --------------------------------------------------------------
    PlateAddRequest:
      type: object
      required: [plate]
      properties:
        plate: { type: string, minLength: 1, maxLength: 16, example: "ABC123" }
        label: { type: string, maxLength: 64, nullable: true, example: "Family car" }

    PlateOut:
      type: object
      required: [id, plate, created_at]
      properties:
        id:    { type: string, format: uuid }
        plate: { type: string, example: "ABC123" }
        label: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    # ---- reservations --------------------------------------------------------
    ReservationStatus:
      type: string
      enum:
        - active
        - pending_check_in
        - checked_in
        - completed
        - cancelled
        - cancelled_late
        - expired_no_show
        - in_conflict

    CheckInMechanism:
      type: string
      enum: [auto_lpr, qr, manual]

    ReservationCreateRequest:
      type: object
      required: [bay_code, expected_arrival_time, card]
      properties:
        bay_code:
          type: string
          minLength: 1
          maxLength: 16
          example: "B01"
        expected_arrival_time:
          type: string
          format: date-time
          description: Must satisfy `0 < expected - now() ≤ 60 min`.
        card:
          $ref: "#/components/schemas/CardDetails"

    CardDetails:
      type: object
      description: |
        Mock-payment card sub-object (proposal §5.6). Validated against the
        in-process `mock_cards` table — never reaches a real bank.
      required: [number, cvv, expiry_month, expiry_year, holder_name]
      properties:
        number:
          type: string
          minLength: 13
          maxLength: 19
          pattern: "^[0-9]+$"
          example: "4111111111111111"
        cvv:
          type: string
          minLength: 3
          maxLength: 4
          pattern: "^[0-9]+$"
          example: "123"
        expiry_month:
          type: integer
          minimum: 1
          maximum: 12
        expiry_year:
          type: integer
          minimum: 2024
          maximum: 2099
        holder_name:
          type: string
          minLength: 1
          maxLength: 120

    ReservationCheckInRequest:
      type: object
      required: [bay_code, source]
      properties:
        bay_code: { type: string, minLength: 1, maxLength: 16 }
        source:
          type: string
          enum: [qr, manual]

    ReservationOut:
      type: object
      required: [id, bay_code, user_id, status, expected_arrival_time, booked_at]
      properties:
        id: { type: string, format: uuid }
        bay_code: { type: string }
        user_id: { type: string, format: uuid }
        status: { $ref: "#/components/schemas/ReservationStatus" }
        expected_arrival_time: { type: string, format: date-time }
        booked_at: { type: string, format: date-time }
        check_in_grace_expires_at: { type: string, format: date-time, nullable: true }
        checked_in_at: { type: string, format: date-time, nullable: true }
        check_in_mechanism:
          allOf:
            - $ref: "#/components/schemas/CheckInMechanism"
          nullable: true
        cancelled_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
        payment:
          allOf:
            - $ref: "#/components/schemas/ReservationDepositInfo"
          nullable: true
          description: |
            Present on the `POST /reservations` 201 response (carries the
            held deposit). Omitted on list/detail/cancel/check-in responses.

    ReservationDepositInfo:
      type: object
      required: [deposit_cents]
      properties:
        deposit_cents:
          type: integer
          description: Amount held on the user's mock card at booking, in cents.
          example: 1000

    # ---- payments ------------------------------------------------------------
    PaymentAction:
      type: string
      enum: [pre_auth, release, refund, penalty_capture]
      description: |
        - `pre_auth` — deposit hold at booking.
        - `release` — restore remaining deposit (clean cancel / completion /
          remainder after a partial penalty).
        - `refund` — full refund issued on strong-evidence conflicts (the
          holder is a victim, not a violator).
        - `penalty_capture` — penalty kept from the deposit
          (`late_cancel` / `no_show` / `weak_conflict`).

    PenaltyKind:
      type: string
      enum: [late_cancel, no_show, weak_conflict]
      description: |
        Set only when `action='penalty_capture'`. Strong-evidence conflicts
        are deliberately **not** a user penalty (proposal §5.5).

    PaymentStatus:
      type: string
      enum: [succeeded, failed, voided]

    TransactionOut:
      type: object
      required: [id, reservation_id, action, amount_cents, status, occurred_at]
      properties:
        id: { type: string, format: uuid }
        reservation_id: { type: string, format: uuid }
        action: { $ref: "#/components/schemas/PaymentAction" }
        penalty_kind:
          allOf:
            - $ref: "#/components/schemas/PenaltyKind"
          nullable: true
        amount_cents: { type: integer }
        status: { $ref: "#/components/schemas/PaymentStatus" }
        occurred_at: { type: string, format: date-time }

    TransactionListResponse:
      type: object
      required: [transactions]
      properties:
        transactions:
          type: array
          items: { $ref: "#/components/schemas/TransactionOut" }

    # ---- conflicts -----------------------------------------------------------
    ConflictKind:
      type: string
      enum: [strong, weak]
      description: |
        `strong` — LPR plate ∉ user's bound plates (facility incident; the
        holder's deposit is **refunded**, no penalty). `weak` — LPR did
        not auto-resolve and the check-in grace expired (a `weak_conflict`
        penalty is captured against the deposit).

    ConflictResolution:
      type: string
      enum: [vehicle_left, admin_resolved, user_arrived_and_checked_in]
      description: |
        `user_arrived_and_checked_in` is only valid for `kind='weak'` and
        is set automatically by the fallback check-in path.

    ConflictOut:
      type: object
      required: [id, bay_code, kind, detected_at]
      properties:
        id: { type: string, format: uuid }
        bay_code: { type: string }
        kind: { $ref: "#/components/schemas/ConflictKind" }
        reservation_id: { type: string, format: uuid, nullable: true }
        recognised_plate:
          type: string
          nullable: true
          description: Present on `kind='strong'` (and absent on `weak`).
        lpr_confidence:
          type: number
          format: double
          nullable: true
        evidence_image_url:
          type: string
          nullable: true
          description: Server-side path to the captured JPEG (strong only).
        image_purge_at:
          type: string
          format: date-time
          nullable: true
        detected_at: { type: string, format: date-time }
        resolved_at: { type: string, format: date-time, nullable: true }
        resolution:
          allOf:
            - $ref: "#/components/schemas/ConflictResolution"
          nullable: true

    ConflictResolveRequest:
      type: object
      required: [resolution]
      properties:
        resolution:
          type: string
          enum: [vehicle_left, admin_resolved, user_arrived_and_checked_in]
